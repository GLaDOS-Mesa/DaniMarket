<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      color: #1f2937;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status.ready {
      background: #f0fdf4;
      color: #166534;
    }
    .status.idle {
      background: #f9fafb;
      color: #6b7280;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; }
    .dot.gray { background: #d1d5db; }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>DaniMarket Assistant</h1>
  <div id="status" class="status idle">
    <span class="dot gray"></span>
    <span id="status-text">In attesa...</span>
  </div>
  <p class="info" id="info"></p>
  <script src="popup.js"></script>
</body>
</html>
